<!DOCTYPE html>
<html>
<head>
  <title>Location Dashboard</title>
</head>
<body>

<h2>User Location Dashboard</h2>

<table border="1" cellpadding="10">
  <thead>
    <tr>
      <th>Latitude</th>
      <th>Longitude</th>
      <th>Time</th>
      <th>Device</th>
      <th>Map</th>
    </tr>
  </thead>
  <tbody id="dataTable"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔹 Firebase config (same jo tumne pehle use kiya)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 Data fetch karna
async function loadData() {
  const querySnapshot = await getDocs(collection(db, "user_locations"));
  let table = document.getElementById("dataTable");

  querySnapshot.forEach((doc) => {
    let data = doc.data();

    let lat = data.latitude;
    let lng = data.longitude;
    let time = data.time;
    let device = data.userAgent;

    let mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

    let row = `
      <tr>
        <td>${lat}</td>
        <td>${lng}</td>
        <td>${time}</td>
        <td>${device}</td>
        <td><a href="${mapLink}" target="_blank">View Map</a></td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
